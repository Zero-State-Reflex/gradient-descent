<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gradient Descent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'SF Mono', 'Fira Code', monospace; }
    canvas { display: block; }
    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
    }
    #title {
      position: fixed; top: 32px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.85); font-size: 14px; letter-spacing: 6px;
      text-transform: uppercase; z-index: 20; pointer-events: none;
      text-shadow: 0 0 20px rgba(100,180,255,0.5);
    }
    #info {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.5); font-size: 11px; letter-spacing: 3px;
      text-transform: uppercase; z-index: 20; pointer-events: none;
    }
    #stats {
      position: fixed; top: 32px; right: 32px;
      color: rgba(100,200,255,0.7); font-size: 11px; letter-spacing: 2px;
      z-index: 20; pointer-events: none; text-align: right; line-height: 1.8;
    }
  </style>
</head>
<body>
  <div id="title">Gradient Descent</div>
  <div id="stats"></div>
  <div id="info">drag to rotate &middot; scroll to zoom &middot; double-click to restart &middot; M to mute</div>
  <div id="sound-prompt" style="position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,5,16,0.92);display:flex;align-items:center;justify-content:center;
    z-index:100;cursor:pointer;flex-direction:column;gap:16px;">
    <div style="color:rgba(100,200,255,0.9);font-size:13px;letter-spacing:5px;text-transform:uppercase;">
      Gradient Descent</div>
    <div style="color:rgba(255,255,255,0.5);font-size:11px;letter-spacing:3px;text-transform:uppercase;">
      click to begin</div>
  </div>
  <script type="module" src="/main.js"></script>
</body>
</html>
